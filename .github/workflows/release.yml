name: Release Build

# vX.Y.Z タグをpushすると、Linux向けパッケージ(.deb / AppImage)を自動ビルドし、
# 対応するGitHub Releaseへ添付する。

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 依存関係のインストール
        run: npm install

      - name: package.jsonのバージョンをタグに同期
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
          echo "package.json version = $TAG_VERSION"

      - name: Linuxパッケージをビルド(deb + AppImage)
        run: npx electron-builder --linux AppImage deb --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ビルド成果物を一覧表示
        run: ls -lh release/

      - name: SHA256SUMSを生成
        run: |
          cd release
          sha256sum *.deb *.AppImage > SHA256SUMS
          cat SHA256SUMS

      - name: GitHub Releaseへ添付
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.deb
            release/*.AppImage
            release/SHA256SUMS
            release/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
