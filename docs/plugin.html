<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self'; object-src 'none'; base-uri 'none';" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>プラグイン詳細 — Penguin Control Center</title>
<style>
:root{
  --bg:#14171a; --panel:#1c2126; --panel-alt:#20262c; --border:#2a3138;
  --text:#e6edf3; --text-muted:#8b949e;
  --accent:#45d9c0; --accent-dim:#2b8f7e; --warn:#f0a83c;
  --font-mono: ui-monospace,"IBM Plex Mono","JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;
  --font-sans: -apple-system,"Segoe UI",system-ui,"Noto Sans JP",Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);}
a{color:var(--accent)}
.wrap{max-width:820px;margin:0 auto;padding:0 24px;}

nav.topbar{border-bottom:1px solid var(--border);padding:16px 0;}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;}
.brand{font-family:var(--font-mono);font-size:14px;font-weight:600;text-decoration:none;color:var(--text);}
.topbar-links{display:flex;gap:20px;font-family:var(--font-mono);font-size:13px;}
.topbar-links a{color:var(--text-muted);text-decoration:none;}
.topbar-links a:hover{color:var(--text);}

main{padding:40px 0 80px;}
.back-link{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-decoration:none;display:inline-block;margin-bottom:20px;}
.back-link:hover{color:var(--text);}

header.plugin-head{border-bottom:1px solid var(--border);padding-bottom:24px;margin-bottom:24px;}
h1{font-family:var(--font-mono);font-size:26px;margin:0 0 8px;}
.meta-row{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);margin-bottom:14px;}
.desc{color:var(--text-muted);font-size:14px;line-height:1.7;max-width:60ch;margin-bottom:18px;}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.tag{font-family:var(--font-mono);font-size:10px;background:var(--panel-alt);border:1px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--text-muted);}
.tag.code-badge{color:var(--warn);border-color:var(--warn);}
.tag.manifest-badge{color:var(--accent);border-color:var(--accent-dim);}
.btn{font-family:var(--font-mono);font-size:13px;background:var(--accent-dim);border:1px solid var(--accent);color:#06201b;font-weight:600;border-radius:6px;padding:10px 18px;text-decoration:none;display:inline-block;}

.docs-body{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px 28px;line-height:1.75;}
.docs-body h1,.docs-body h2{font-family:var(--font-mono);}
.docs-body h1{font-size:18px;margin-top:0;}
.docs-body h2{font-size:15px;}
.docs-body code{font-family:var(--font-mono);background:var(--panel-alt);padding:1px 5px;border-radius:4px;font-size:13px;}
.docs-body table{border-collapse:collapse;width:100%;margin:14px 0;}
.docs-body th,.docs-body td{border:1px solid var(--border);padding:6px 10px;font-size:13px;text-align:left;}
.docs-body p{font-size:14px;color:var(--text);}
.docs-body ul{font-size:14px;padding-left:20px;}

.muted{color:var(--text-muted);font-family:var(--font-mono);font-size:13px;}
</style>
</head>
<body>

<nav class="topbar">
  <div class="wrap">
    <a class="brand" href="index.html">🐧 Penguin Control Center</a>
    <div class="topbar-links">
      <a href="store.html">プラグインストア</a>
      <a href="https://github.com/RT2231/penguin-control-center">GitHub</a>
    </div>
  </div>
</nav>

<main>
  <div class="wrap">
    <a class="back-link" href="store.html">← ストア一覧に戻る</a>
    <div id="content"><span class="muted">読み込み中...</span></div>
  </div>
</main>

<script src="markdown.js"></script>
<script src="plugin.js"></script>
</body>
</html>
