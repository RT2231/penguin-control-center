<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2126"/>
      <stop offset="100%" stop-color="#14171a"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="90" fill="none" stroke="#2a3138" stroke-width="4"/>

  <!-- penguin body -->
  <ellipse cx="256" cy="300" rx="132" ry="158" fill="#0b1418"/>
  <!-- belly -->
  <ellipse cx="256" cy="322" rx="84" ry="120" fill="#e6edf3"/>

  <!-- wings -->
  <ellipse cx="132" cy="300" rx="30" ry="90" fill="#0b1418" transform="rotate(-18 132 300)"/>
  <ellipse cx="380" cy="300" rx="30" ry="90" fill="#0b1418" transform="rotate(18 380 300)"/>

  <!-- eyes -->
  <circle cx="222" cy="220" r="16" fill="#0b1418"/>
  <circle cx="290" cy="220" r="16" fill="#0b1418"/>
  <circle cx="226" cy="215" r="4" fill="#45d9c0"/>
  <circle cx="294" cy="215" r="4" fill="#45d9c0"/>

  <!-- beak -->
  <path d="M 238 248 L 274 248 L 256 274 Z" fill="#f0a83c"/>

  <!-- feet -->
  <path d="M 210 434 L 236 434 L 224 456 Z" fill="#f0a83c"/>
  <path d="M 276 434 L 302 434 L 289 456 Z" fill="#f0a83c"/>
</svg>
